<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #14B8A6; padding-bottom: 12px; }
        h1 { color: #0F2443; margin: 0; }
        .logout-form { margin: 0; }
        .logout-form button { background: #94A3B8; color: white; padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #0F2443; color: white; }
        .status-BOOKED    { color: #F59E0B; font-weight: bold; }
        .status-COMPLETED { color: #10B981; font-weight: bold; }
        .status-CANCELLED { color: #94A3B8; }
        .btn-complete {
            background: #10B981; color: white; padding: 4px 10px;
            border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
            margin-right: 8px;
        }
        .btn-complete:hover { background: #059669; }
        .btn-cancel {
            background: #EF4444; color: white; padding: 4px 10px;
            border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .btn-cancel:hover { background: #DC2626; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Dashboard</h1>
            <p>歡迎，<span th:text="${doctor.name}"></span>（<span th:text="${doctor.department}"></span>）</p>
        </div>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <a th:href="@{/password}" style="margin-right: 15px; color: #0F2443; text-decoration: none; font-weight: bold;">修改密碼</a>
            <button type="submit">登出</button>
        </form>
    </header>

    <h2 th:text="|今日掛號：${today}|"></h2>

    <p th:if="${appointments.isEmpty()}">今日沒有掛號。</p>

    <table th:unless="${appointments.isEmpty()}">
        <thead>
            <tr>
                <th>時段</th>
                <th>病患</th>
                <th>病歷號</th>
                <th>狀態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="appt : ${appointments}">
                <td th:text="${appt.timeSlot}">AM</td>
                <td th:text="${appt.patient.name}">測試病患甲</td>
                <td th:text="${appt.patient.chartNo}">TEST00001</td>
                <td>
                    <span th:text="${appt.status}"
                          th:class="${'status-' + appt.status}">BOOKED</span>
                </td>
                <td>
                    <!-- 只有在狀態為 BOOKED 時才顯示按鈕區塊 -->
                    <div th:if="${appt.status == 'BOOKED'}">
                        <button class="btn-complete" th:data-id="${appt.apptId}">看診完成</button>
                        <button class="btn-cancel" th:data-id="${appt.apptId}">取消</button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <p style="margin-top: 20px;"><a th:href="@{/}">← 回首頁</a></p>

    <script>
        // 處理「看診完成」按鈕點擊
        document.querySelectorAll('.btn-complete').forEach(btn => {
            btn.addEventListener('click', function() {
                const apptId = this.getAttribute('data-id');
                if (confirm('確定將此掛號標記為看診完成？')) {
                    updateAppointmentStatus(apptId, 'COMPLETED');
                }
            });
        });

        // 處理「取消」按鈕點擊
        document.querySelectorAll('.btn-cancel').forEach(btn => {
            btn.addEventListener('click', function() {
                const apptId = this.getAttribute('data-id');
                if (confirm('確定要取消這筆掛號嗎？')) {
                    updateAppointmentStatus(apptId, 'CANCELLED');
                }
            });
        });

        // 共同的 API 呼叫函式
        function updateAppointmentStatus(apptId, newStatus) {
            fetch(`/api/appointments/${apptId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            }).then(response => {
                if (response.ok) {
                    window.location.reload(); // 成功後重新整理頁面
                } else {
                    alert('操作失敗，請確認權限或稍後再試');
                }
            }).catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
